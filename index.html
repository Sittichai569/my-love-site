<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>มีเรื่องจะบอก...</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffebee;
            font-family: 'Arial', sans-serif;
            text-align: center;
        }
        h1 { color: #d32f2f; }
        .buttons { margin-top: 20px; }
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 10px;
            border: none;
            transition: 0.3s;
        }
        #yesBtn { background-color: #4caf50; color: white; margin-right: 10px; }
        #noBtn { background-color: #f44336; color: white; position: absolute; }
    </style>
</head>
<body>

    <h1 id="question">เป็นแฟนกับเราไหม? ❤️</h1>
    <div id="image-container">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueGZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/KztT2c4u8mYYUiCi7W/giphy.gif" width="200">
    </div>

    <div class="buttons">
        <button id="yesBtn">ตกลง</button>
        <button id="noBtn">ไม่</button>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');

        // ลูกเล่น: เมื่อเอาเมาส์ไปจ่อปุ่ม "ไม่" ปุ่มจะหนีไปที่อื่น
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        });

        // เมื่อกด "ตกลง"
        yesBtn.addEventListener('click', () => {
            document.body.innerHTML = `
                <h1 style="color: #d32f2f;">เย้! รักที่สุดเลย ❤️</h1>
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueGZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/lNyS63Vat6N68/giphy.gif" width="300">
                <p>เจอกันนะคุณแฟน!</p>
            `;
        });
    </script>
</body>
</html>
